<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Vexium</title>
<meta name="description" content="Whitelisted modded Minecraft server.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200..700&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⛏️</text></svg>">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', system-ui, sans-serif;
  background: #000;
  color: #fff;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
.layout {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  min-height: 100dvh;
}
.header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 1000;
  background: linear-gradient(180deg, rgba(0,0,0,.8), transparent);
}
.header-inner {
  max-width: 1440px;
  margin: 0 auto;
  padding: 1rem 1.5rem;
  display: flex;
  align-items: center;
  gap: 2rem;
}
@media (min-width: 992px) {
  .header-inner { padding: 1.25rem 3rem; }
}
.logo-link {
  display: block;
  flex-shrink: 0;
  height: 44px;
  transition: opacity .2s;
}
.logo-link:hover { opacity: .7; }
.logo-link img {
  height: 100%;
  width: auto;
}
.nav-list {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: .375rem;
  list-style: none;
}
.nav-link {
  color: #a0a0a0;
  font-size: .9375rem;
  font-weight: 500;
  letter-spacing: .015em;
  padding: .5rem 1rem;
  text-decoration: none;
  border-radius: 8px;
  transition: all .2s;
}
.nav-link:hover {
  color: #fff;
  background: rgba(255,255,255,.08);
}
.hero {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: max(100vh, 600px);
  position: relative;
  isolation: isolate;
  background: #0a1628;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  inset: 0;
  z-index: -1;
  background: radial-gradient(ellipse at center, rgba(0,0,0,.35) 0%, rgba(0,0,0,.85) 100%);
}
.hero-portal {
  position: absolute;
  inset: -50%;
  z-index: -2;
  background:
    conic-gradient(from 0deg, #7dd3fc, #e0f2fe, #bae6fd, #38bdf8, #7dd3fc, #e0f2fe, #bae6fd, #38bdf8, #7dd3fc),
    conic-gradient(from 0deg, #bae6fd80, #e0f2fe80, #7dd3fc80, #38bdf880, #bae6fd80);
  background-blend-mode: overlay;
  animation: portalSpin 20s linear infinite, portalPulse 4s ease-in-out infinite alternate;
  opacity: .35;
}
.hero-portal2 {
  position: absolute;
  inset: -25%;
  z-index: -2;
  background: radial-gradient(circle at 30% 40%, rgba(186,230,253,.15) 0%, transparent 50%),
              radial-gradient(circle at 70% 60%, rgba(56,189,248,.1) 0%, transparent 50%);
  animation: portalDrift 12s ease-in-out infinite alternate;
}
@keyframes portalSpin {
  from { transform: rotate(0deg) scale(1); }
  to { transform: rotate(360deg) scale(1); }
}
@keyframes portalPulse {
  from { opacity: .3; }
  to { opacity: .45; }
}
@keyframes portalDrift {
  from { transform: translate(0, 0) scale(1); }
  to { transform: translate(3%, 2%) scale(1.1); }
}
.hero-logo {
  max-width: 100%;
  margin: 0 1.5rem;
  user-select: none;
  animation: fadeUp 1s ease-out forwards;
}
.hero-logo img {
  display: block;
  width: 100%;
  max-width: 700px;
  height: auto;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(30px) scale(.95); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.hero-support {
  display: inline-flex;
  align-items: center;
  gap: .75rem;
  background: rgba(255,255,255,.06);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(250, 201, 55, .2);
  border-radius: 14px;
  padding: 1rem 1.75rem;
  color: #fac937;
  text-decoration: none;
  margin-top: 3rem;
  font-size: 1.125rem;
  font-weight: 600;
  transition: all .25s;
  animation: fadeUp 1s ease-out .2s both;
}
.hero-support:hover {
  background: rgba(250, 201, 55, .1);
  border-color: rgba(250, 201, 55, .4);
  transform: translateY(-2px);
}
.content {
  max-width: 1440px;
  margin: 0 auto;
  padding: 1rem calc(1rem + env(safe-area-inset-right)) 1rem calc(1rem + env(safe-area-inset-left));
}
@media (min-width: 992px) {
  .content { padding: 2rem calc(3rem + env(safe-area-inset-right)) 2rem calc(3rem + env(safe-area-inset-left)); }
}
.footer {
  margin-top: auto;
  background: #111;
  border-top: 1px solid rgba(255,255,255,.06);
  display: flex;
  flex-direction: column;
  gap: 2.5rem;
  padding-block: 2.5rem;
  position: relative;
}
.footer-top {
  display: flex;
  width: 100%;
}
.footer-grid {
  display: flex;
  flex-direction: column;
  gap: 2rem;
  width: 100%;
}
@media (min-width: 768px) {
  .footer-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
  }
}
.footer-col {
  display: flex;
  flex-direction: column;
  gap: .5rem;
}
.footer-col-right {
  grid-column: 3;
  display: flex;
  flex-direction: column;
}
.footer-tagline {
  font-size: .9375rem;
  color: #666;
  font-weight: 400;
}
.footer-menu {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: .375rem;
}
.footer-menu li {
  text-align: right;
}
.footer-menu a {
  text-decoration: none;
  color: #888;
  font-size: .9375rem;
  font-weight: 500;
  transition: color .2s;
}
.footer-menu a:hover { color: #fff; }
.footer-bottom {
  display: flex;
  width: 100%;
  justify-content: space-between;
  gap: .5rem;
  padding-top: 1rem;
  border-top: 1px solid rgba(255,255,255,.05);
}
.footer-bottom p {
  font-size: .8125rem;
  color: #555;
}
.footer-bottom a {
  color: #888;
  font-weight: 600;
  text-decoration: none;
  transition: color .2s;
}
.footer-bottom a:hover { color: #fff; }
</style>
</head>
<body>
<div class="layout">
  <header class="header">
    <div class="header-inner">
      <a href="/" class="logo-link" aria-label="Vexium home">
        <img src="vexium.png" alt="Vexium">
      </a>
      <nav>
        <ul class="nav-list">
          <li><a href="https://discord.gg/Ss86HsfkSF" rel="noopener noreferrer" target="_blank" class="nav-link">Discord</a></li>
          <li><a href="https://mapvexium.aetherlyn.lol" rel="noopener noreferrer" target="_blank" class="nav-link">Map</a></li>
          <li><a href="https://drive.google.com/drive/folders/1pjsumJJ6YVrZrjSZAOAkYsQBgNJs3X3x?usp=sharing" rel="noopener noreferrer" target="_blank" class="nav-link">Modpack</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="hero-portal"></div>
      <div class="hero-portal2"></div>
      <div class="hero-logo">
        <img src="vexium.png" alt="Vexium">
      </div>
      <a href="https://ko-fi.com/piponidlo" rel="noopener noreferrer" target="_blank" class="hero-support">
        <svg width="20" height="20" viewBox="0 0 38 38" fill="none">
          <path d="M19 4L23.09 12.36L32 13.54L25.5 19.88L27.18 29L19 24.36L10.82 29L12.5 19.88L6 13.54L14.91 12.36L19 4Z" fill="#fac937"/>
        </svg>
        Support the project
      </a>
    </section>
  </main>

  <footer class="footer">
    <div class="content footer-top">
      <a href="/" class="logo-link" aria-label="Vexium home">
        <img src="vexium.png" alt="Vexium" style="height:36px;">
      </a>
    </div>
    <div class="content footer-grid">
      <div class="footer-col">
        <p class="footer-tagline">Whitelisted modded Minecraft server</p>
      </div>
      <div class="footer-col-right">
        <ul class="footer-menu">
          <li><a href="https://discord.gg/Ss86HsfkSF" rel="noopener noreferrer" target="_blank">Discord</a></li>
          <li><a href="https://ko-fi.com/piponidlo" rel="noopener noreferrer" target="_blank">Support the project</a></li>
        </ul>
      </div>
    </div>
    <div class="content footer-bottom">
      <p>&copy; 2026 <strong>Vexium</strong></p>
      <p>web by <a href="https://tiktok.com/@piponidlo" rel="noopener noreferrer" target="_blank">lordpipon</a></p>
    </div>
  </footer>
</div>
</body>
</html>
