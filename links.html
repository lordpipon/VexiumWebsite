<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Links - Vexium</title>
<meta name="description" content="Vexium links.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200..700&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⛏️</text></svg>">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', system-ui, sans-serif;
  background: #000;
  color: #fff;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
.layout {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  min-height: 100dvh;
}
.header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 1000;
  background: linear-gradient(180deg, rgba(0,0,0,.8), transparent);
}
.header-inner {
  max-width: 1440px;
  margin: 0 auto;
  padding: 1rem 1.5rem;
  display: flex;
  align-items: center;
  gap: 2rem;
}
@media (min-width: 992px) {
  .header-inner { padding: 1.25rem 3rem; }
}
.logo-link {
  display: block;
  flex-shrink: 0;
  height: 44px;
  transition: opacity .2s;
}
.logo-link:hover { opacity: .7; }
.logo-link img {
  height: 100%;
  width: auto;
}
.nav-list {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: .375rem;
  list-style: none;
}
.nav-link {
  color: #a0a0a0;
  font-size: .9375rem;
  font-weight: 500;
  letter-spacing: .015em;
  padding: .5rem 1rem;
  text-decoration: none;
  border-radius: 8px;
  transition: all .2s;
}
.nav-link:hover {
  color: #fff;
  background: rgba(255,255,255,.08);
}
.nav-link.active {
  color: #fac937;
  background: rgba(250,201,55,.1);
}
.hero {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: max(100vh, 600px);
  position: relative;
  isolation: isolate;
  background: #1a1400;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  inset: 0;
  z-index: -1;
  background: radial-gradient(ellipse at center, rgba(0,0,0,.4) 0%, rgba(0,0,0,.9) 100%);
}
.hero-portal {
  position: absolute;
  inset: -60%;
  z-index: -2;
  background:
    conic-gradient(from 0deg, #facc15, #eab308, #ca8a04, #f59e0b, #facc15, #eab308, #ca8a04, #f59e0b, #facc15),
    conic-gradient(from 60deg, #b45309, #d97706, #f59e0b, #ca8a04, #b45309, #d97706, #f59e0b, #ca8a04, #b45309);
  background-blend-mode: screen;
  animation: portalSpin 10s linear infinite, portalPulse 2s ease-in-out infinite alternate;
  opacity: .3;
  filter: blur(1px);
}
.hero-portal2 {
  position: absolute;
  inset: -40%;
  z-index: -2;
  background:
    conic-gradient(from 180deg, #eab308, #facc1580, #fef08a, #f59e0b80, #eab308, #facc1580, #fef08a, #f59e0b80, #eab308);
  animation: portalSpin2 15s linear infinite reverse;
  opacity: .25;
  mix-blend-mode: screen;
}
.hero-portal3 {
  position: absolute;
  inset: -20%;
  z-index: -2;
  background:
    radial-gradient(circle at 40% 50%, rgba(234,179,8,.2) 0%, transparent 40%),
    radial-gradient(circle at 60% 50%, rgba(250,204,21,.15) 0%, transparent 40%),
    radial-gradient(circle at 50% 30%, rgba(254,240,138,.1) 0%, transparent 30%);
  animation: portalDrift 5s ease-in-out infinite alternate;
}
@keyframes portalSpin {
  from { transform: rotate(0deg) scale(1); }
  to { transform: rotate(360deg) scale(1); }
}
@keyframes portalSpin2 {
  from { transform: rotate(0deg) scale(1.1); }
  to { transform: rotate(360deg) scale(1.1); }
}
@keyframes portalPulse {
  from { opacity: .2; }
  to { opacity: .4; }
}
@keyframes portalDrift {
  from { transform: translate(0, 0) scale(1); }
  to { transform: translate(2%, -2%) scale(1.05); }
}
.content {
  max-width: 1440px;
  margin: 0 auto;
  padding: 1rem calc(1rem + env(safe-area-inset-right)) 1rem calc(1rem + env(safe-area-inset-left));
  width: 100%;
}
@media (min-width: 992px) {
  .content { padding: 2rem calc(3rem + env(safe-area-inset-right)) 2rem calc(3rem + env(safe-area-inset-left)); }
}
.footer {
  margin-top: auto;
  background: #111;
  border-top: 1px solid rgba(255,255,255,.06);
  display: flex;
  flex-direction: column;
  gap: 2.5rem;
  padding-block: 2.5rem;
  position: relative;
}
.footer-top {
  display: flex;
  width: 100%;
}
.footer-grid {
  display: flex;
  flex-direction: column;
  gap: 2rem;
  width: 100%;
}
@media (min-width: 768px) {
  .footer-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
  }
}
.footer-col {
  display: flex;
  flex-direction: column;
  gap: .5rem;
}
.footer-col-right {
  grid-column: 3;
  display: flex;
  flex-direction: column;
}
.footer-tagline {
  font-size: .9375rem;
  color: #666;
  font-weight: 400;
}
.footer-menu {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: .375rem;
}
.footer-menu li {
  text-align: right;
}
.footer-menu a {
  text-decoration: none;
  color: #888;
  font-size: .9375rem;
  font-weight: 500;
  transition: color .2s;
}
.footer-menu a:hover { color: #fff; }
.footer-bottom {
  display: flex;
  width: 100%;
  justify-content: space-between;
  gap: .5rem;
  padding-top: 1rem;
  border-top: 1px solid rgba(255,255,255,.05);
}
.footer-bottom p {
  font-size: .8125rem;
  color: #555;
}
.footer-bottom a {
  color: #888;
  font-weight: 600;
  text-decoration: none;
  transition: color .2s;
}
.footer-bottom a:hover { color: #fff; }
.links-section {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: max(100vh, 600px);
  position: relative;
  isolation: isolate;
  background: #1a1400;
  overflow: hidden;
}
.links-section::before {
  content: '';
  position: absolute;
  inset: 0;
  z-index: -1;
  background: radial-gradient(ellipse at center, rgba(0,0,0,.4) 0%, rgba(0,0,0,.9) 100%);
}
.links-inner {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1.5rem;
  width: 100%;
  max-width: 420px;
  padding: 0 1.5rem;
}
.links-title {
  font-size: 1.5rem;
  font-weight: 700;
  color: #fac937;
  margin-bottom: .5rem;
  animation: fadeUp 1s ease-out forwards;
}
.links-card {
  display: flex;
  align-items: center;
  gap: 1rem;
  width: 100%;
  padding: 1rem 1.5rem;
  background: rgba(255,255,255,.05);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 14px;
  text-decoration: none;
  color: #fff;
  font-size: 1rem;
  font-weight: 500;
  transition: all .25s;
  animation: fadeUp 1s ease-out forwards;
  animation-fill-mode: both;
}
.links-card:nth-child(2) { animation-delay: .1s; }
.links-card:nth-child(3) { animation-delay: .2s; }
.links-card:nth-child(4) { animation-delay: .3s; }
.links-card:nth-child(5) { animation-delay: .4s; }
.links-card:hover {
  background: rgba(255,255,255,.1);
  border-color: rgba(250,201,55,.3);
  transform: translateY(-2px);
}
.links-card-icon {
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 10px;
  flex-shrink: 0;
}
.links-card-label {
  flex: 1;
}
.links-card-arrow {
  color: #555;
  font-size: 1.25rem;
  transition: transform .2s;
}
.links-card:hover .links-card-arrow {
  transform: translateX(3px);
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px) scale(.95); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
</style>
</head>
